apiVersion: batch/v1
kind: Job
metadata:
  namespace: phasma
  name: broker-backfill
  labels:
    app: phasma
    tier: broker
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phasma
        tier: broker
    spec:
      restartPolicy: Never
      serviceAccountName: connect
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: provision-connect-user
        image: postgres:18.4-alpine
        imagePullPolicy: IfNotPresent
        command: [sh, -c]
        args:
        - |
          psql "postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/phasma?sslmode=require" \
            -v app_pass="${CONNECT_DB_PASSWORD}" \
            -c "DO \$\$
                DECLARE v text := :'app_pass';
                BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'phasma_connect_user') THEN
                    EXECUTE format('CREATE USER phasma_connect_user WITH PASSWORD %%L', v);
                  ELSE
                    EXECUTE format('ALTER USER phasma_connect_user WITH PASSWORD %%L', v);
                  END IF;
                  GRANT phasma_connect TO phasma_connect_user;
                END \$\$;"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            memory: 64Mi
          requests:
            memory: 64Mi
            cpu: 50m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: postgres-password
        - name: CONNECT_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: connect-secret
              key: connect-db-password
      containers:
      - name: connect
        image: docker.redpanda.com/redpandadata/connect:4.38.0
        command: ["/redpanda-connect", "run", "/etc/connect/backfill.yaml"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        env:
        - name: CONNECT_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: connect-secret
              key: connect-db-password
        - name: POSTGRES_DB
          value: phasma
        - name: DATABASE_URL
          value: postgresql://phasma_connect_user:$(CONNECT_DB_PASSWORD)@database:5432/$(POSTGRES_DB)?sslmode=require
        - name: S3_ENDPOINT
          value: http://storage:8333
        - name: S3_BUCKET
          value: phasma
        - name: S3_REGION
          value: us-east-1
        - name: S3_FORCE_PATH_STYLE
          value: "true"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: storage-secret
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: storage-secret
              key: s3-secret-key
        - name: MEILI_URL
          value: http://search:7700
        - name: MEILI_CONNECT_KEY
          valueFrom:
            secretKeyRef:
              name: connect-secret
              key: meili-connect-key
        - name: REDPANDA_BROKERS
          value: broker:9092
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 128Mi
            cpu: 100m
        volumeMounts:
        - name: pipelines
          mountPath: /etc/connect
      volumes:
      - name: pipelines
        configMap:
          name: broker-pipelines
          defaultMode: 0444
