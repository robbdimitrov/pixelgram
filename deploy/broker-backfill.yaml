apiVersion: batch/v1
kind: Job
metadata:
  name: broker-backfill
  labels:
    app: phasma
    tier: broker
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: phasma
        tier: broker
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: connect
        image: docker.redpanda.com/redpandadata/connect:4.38.0
        command: ["/redpanda-connect", "run", "/etc/connect/backfill.yaml"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: POSTGRES_DB
          value: phasma
        - name: DATABASE_URL
          value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@database:5432/$(POSTGRES_DB)
        - name: S3_ENDPOINT
          value: http://storage:8333
        - name: S3_BUCKET
          value: phasma
        - name: S3_REGION
          value: us-east-1
        - name: S3_FORCE_PATH_STYLE
          value: "true"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: s3-secret-key
        - name: MEILI_URL
          value: http://search:7700
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: meili-master-key
        - name: REDPANDA_BROKERS
          value: broker:9092
        volumeMounts:
        - name: pipelines
          mountPath: /etc/connect
      volumes:
      - name: pipelines
        configMap:
          name: broker-pipelines
          defaultMode: 0444
