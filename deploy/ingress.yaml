apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  labels:
    app: phasma
    tier: frontend
  annotations:
    # Uploads stream through the frontend BFF, so the request body reaches the
    # ingress. Allow the backend's 1 MB image limit plus multipart overhead.
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  # The SvelteKit server is the only public entry point; it proxies /api and
  # /uploads to the backend in-cluster, so no backend routes are exposed here.
  rules:
    - host: phasma.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
  tls:
    - hosts:
        - phasma.localhost
      secretName: frontend-tls
