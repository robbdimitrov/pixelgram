apiVersion: v1
kind: Service
metadata:
  name: storage
  labels:
    app: pixelgram
    tier: storage
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: pixelgram
    tier: storage
  ports:
  - name: s3
    port: 8333
    targetPort: s3
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storage
  labels:
    app: pixelgram
    tier: storage
spec:
  serviceName: storage
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: pixelgram
      tier: storage
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: pixelgram
        tier: storage
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: seaweedfs
        image: chrislusf/seaweedfs
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        args:
        - |
          printf '{"identities":[{"name":"pixelgram","credentials":[{"accessKey":"%s","secretKey":"%s"}],"actions":["Admin","Read","List","Tagging","Write"]}]}\n' \
            "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}" > /tmp/s3.json
          exec weed server -dir=/data -s3 -s3.port=8333 -s3.config=/tmp/s3.json
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - name: s3
          containerPort: 8333
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 128Mi
            cpu: 100m
        env:
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: s3-secret-key
        readinessProbe:
          tcpSocket:
            port: s3
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        startupProbe:
          tcpSocket:
            port: s3
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          tcpSocket:
            port: s3
          failureThreshold: 6
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - mountPath: /data
          name: storage-data
        - mountPath: /tmp
          name: temporary-files
      volumes:
      - name: temporary-files
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: storage-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
