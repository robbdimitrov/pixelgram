apiVersion: v1
kind: Service
metadata:
  namespace: phasma
  name: search
  labels:
    app: phasma
    tier: search
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: phasma
    tier: search
  ports:
  - name: http
    port: 7700
    targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: phasma
  name: search
  labels:
    app: phasma
    tier: search
spec:
  serviceName: search
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: phasma
      tier: search
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: phasma
        tier: search
    spec:
      serviceAccountName: search
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: search
        image: getmeili/meilisearch:v1.11.3
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - name: http
          containerPort: 7700
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
            cpu: 100m
        env:
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: search-secret
              key: search-master-key
        - name: MEILI_ENV
          value: production
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 6
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - mountPath: /meili_data
          name: search-data
        - mountPath: /tmp
          name: temporary-files
      volumes:
      - name: temporary-files
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: search-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
