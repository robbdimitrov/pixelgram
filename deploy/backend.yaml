apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: pixelgram
    tier: backend
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: pixelgram
    tier: backend
spec:
  # Pinned to a single replica: uploaded images live on a ReadWriteOnce PVC
  # (see storagevolume.yaml), which can only be mounted by one node. Horizontal
  # scaling requires moving image bytes to object storage (S3/GCS/MinIO) behind
  # the /uploads/{key} path; sessions and rate limits are already in Postgres.
  replicas: 1
  # Recreate (not RollingUpdate): a second pod cannot mount the RWO image PVC
  # while the old pod holds it, so a surge would deadlock the rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pixelgram
      tier: backend
  template:
    metadata:
      labels:
        app: pixelgram
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: migration
        image: localhost:5000/pixelgram/database
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
      containers:
      - name: backend
        image: localhost:5000/pixelgram/backend
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 128Mi
          requests:
            memory: 64Mi
            cpu: 100m
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: POSTGRES_DB
          value: pixelgram
        - name: DATABASE_URL
          value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@database:5432/$(POSTGRES_DB)
        - name: IMAGE_DIR
          value: /data/images
        - name: TRUST_PROXY
          value: "true"
        - name: SESSION_HASH_SECRET
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: session-hash-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        volumeMounts:
        - mountPath: /data/images
          name: image-storage
      volumes:
      - name: image-storage
        persistentVolumeClaim:
          claimName: image-storage-pvc
