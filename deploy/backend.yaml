apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: phasma
    tier: backend
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: phasma
    tier: backend
spec:
  # The single replica is a resource policy; backend state is shared through
  # PostgreSQL and object storage, so the service remains HA-ready.
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: phasma
      tier: backend
  template:
    metadata:
      labels:
        app: phasma
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: migration
        image: localhost:5000/phasma/database
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            memory: 64Mi
          requests:
            memory: 32Mi
            cpu: 50m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
      containers:
      - name: backend
        image: localhost:5000/phasma/backend
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 128Mi
            cpu: 100m
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: POSTGRES_DB
          value: phasma
        - name: DATABASE_URL
          value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@database:5432/$(POSTGRES_DB)
        - name: S3_ENDPOINT
          value: http://storage:8333
        - name: S3_BUCKET
          value: phasma
        - name: S3_REGION
          value: us-east-1
        - name: S3_FORCE_PATH_STYLE
          value: "true"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: s3-secret-key
        - name: DRAGONFLY_URL
          value: redis://cache:6379
        - name: DRAGONFLY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: dragonfly-password
        - name: TRUST_PROXY
          value: "true"
        - name: SESSION_HASH_SECRET
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: session-hash-secret
        - name: MEILI_URL
          value: http://search:7700
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: meili-master-key
        - name: REDPANDA_BROKERS
          value: broker:9092
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
