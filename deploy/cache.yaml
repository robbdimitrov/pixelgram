apiVersion: v1
kind: Service
metadata:
  name: cache
  labels:
    app: pixelgram
    tier: cache
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: pixelgram
    tier: cache
  ports:
  - name: redis
    port: 6379
    targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  labels:
    app: pixelgram
    tier: cache
spec:
  serviceName: cache
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: pixelgram
      tier: cache
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: pixelgram
        tier: cache
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: dragonfly
        image: docker.dragonflydb.io/dragonflydb/dragonfly
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -ec
        args:
        - exec dragonfly "--requirepass=${DRAGONFLY_PASSWORD}" --dir=/data
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - name: redis
          containerPort: 6379
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 128Mi
            cpu: 100m
        env:
        - name: DRAGONFLY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: dragonfly-password
        readinessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        startupProbe:
          tcpSocket:
            port: redis
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          tcpSocket:
            port: redis
          failureThreshold: 6
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - mountPath: /data
          name: cache-data
  volumeClaimTemplates:
  - metadata:
      name: cache-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
