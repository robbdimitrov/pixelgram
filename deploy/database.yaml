apiVersion: v1
kind: Service
metadata:
  name: database
spec:
  selector:
    app: pixelgram
    tier: database
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  labels:
    app: pixelgram
    tier: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pixelgram
      tier: database
  template:
    metadata:
      labels:
        app: pixelgram
        tier: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: database
        image: postgres:18.4-alpine
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 5432
        resources:
          limits:
            memory: 512Mi
            cpu: 1000m
          requests:
            memory: 256Mi
            cpu: 500m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: POSTGRES_DB
          value: pixelgram
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - pixelgram
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - pixelgram
          failureThreshold: 30
          periodSeconds: 2
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: database-storage
      volumes:
      - name: database-storage
        persistentVolumeClaim:
          claimName: database-pvc
