apiVersion: v1
kind: Service
metadata:
  namespace: phasma
  name: database
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: phasma
    tier: database
  ports:
  - name: database
    port: 5432
    targetPort: database
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: phasma
  name: database
  labels:
    app: phasma
    tier: database
spec:
  serviceName: database
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: phasma
      tier: database
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: phasma
        tier: database
    spec:
      serviceAccountName: database
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: database
        image: postgres:18.4-alpine
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - wal_level=logical
        - -c
        - ssl=on
        - -c
        - ssl_cert_file=/certs/tls.crt
        - -c
        - ssl_key_file=/certs/tls.key
        securityContext:
          allowPrivilegeEscalation: false
          # readOnlyRootFilesystem intentionally omitted: PostgreSQL requires
          # write access to PGDATA and /var/run/postgresql for socket and PID files.
          capabilities:
            drop:
            - ALL
        ports:
        - name: database
          containerPort: 5432
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 512Mi
            cpu: 500m
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: database-password
        - name: POSTGRES_DB
          value: phasma
        - name: PGDATA
          value: /var/lib/postgresql/18/docker
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - phasma
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - phasma
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - phasma
          failureThreshold: 6
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - mountPath: /var/lib/postgresql
          name: database-storage
        - mountPath: /certs
          name: database-tls
          readOnly: true
      volumes:
      - name: database-tls
        secret:
          secretName: database-tls
          defaultMode: 0640
  volumeClaimTemplates:
  - metadata:
      name: database-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
