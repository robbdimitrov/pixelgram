apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: pixelgram
    tier: backend
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: pixelgram
    tier: backend
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pixelgram
      tier: backend
  template:
    metadata:
      labels:
        app: pixelgram
        tier: backend
    spec:
      containers:
      - name: backend
        image: localhost:5000/pixelgram/backend
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 200Mi
            cpu: 500m
          requests:
            memory: 100Mi
            cpu: 200m
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: POSTGRES_DB
          value: pixelgram
        - name: DATABASE_URL
          value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@database:5432/$(POSTGRES_DB)
        - name: IMAGE_DIR
          value: /data/images
        volumeMounts:
        - mountPath: /data/images
          name: image-storage
      volumes:
      - name: image-storage
        persistentVolumeClaim:
          claimName: image-storage-pvc
