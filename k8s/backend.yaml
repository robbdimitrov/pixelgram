apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: pixelgram
    tier: backend
  ports:
  - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: pixelgram
    tier: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pixelgram
      tier: backend
  template:
    metadata:
      labels:
        app: pixelgram
        tier: backend
    spec:
      containers:
      - name: backend
        image: localhost:5000/pixelgram/backend
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 100Mi
            cpu: 500m
          requests:
            memory: 50Mi
            cpu: 100m
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-password
        - name: POSTGRES_DB
          value: pixelgram
        - name: DATABASE_URL
          value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@database:5432/$(POSTGRES_DB)
        - name: IMAGE_DIR
          value: /data/images
        - name: SESSION_HASH_SECRET
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: session-hash-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        volumeMounts:
        - mountPath: /data/images
          name: image-storage
      volumes:
      - name: image-storage
        persistentVolumeClaim:
          claimName: image-storage-pvc
