<div class="card glass mx-auto my-6 flex max-w-xl flex-col gap-6 rounded-3xl border border-base-300/40 bg-base-100/70 p-6 shadow-2xl shadow-slate-900/10 backdrop-blur-2xl sm:my-10 sm:p-8">
  <!-- Back Header -->
  <div class="flex items-center gap-3 pb-2 border-b border-base-200/40">
    <a routerLink="/settings" class="btn btn-ghost btn-circle btn-sm text-base-content/60 hover:bg-base-200/50 hover:text-primary transition-colors" title="Back to Settings">
      <svg lucideArrowLeft class="h-5 w-5"></svg>
    </a>
    <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">Change Password</h1>
  </div>

  <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-4">
    <!-- Current Password Input -->
    <div class="form-control">
      <label for="old-password" class="label pb-0.5">
        <span class="label-text font-bold text-xs uppercase tracking-wider text-base-content/70">Current Password</span>
      </label>
      <div class="relative flex items-center">
        <input 
          [type]="oldPasswordFieldType" 
          id="old-password" 
          name="old-password" 
          #oldPasswordInput
          [(ngModel)]="oldPasswordValue" 
          class="input input-bordered w-full rounded-xl bg-base-200/40 border-base-300 focus:bg-base-100 focus:border-primary transition-all duration-300 pr-16"
          placeholder="••••••••" 
          required
        >
        <button type="button" class="btn btn-ghost btn-xs absolute right-3 rounded-lg text-[10px] uppercase font-black tracking-widest text-primary/90 hover:text-primary hover:bg-base-300/40" (click)="onVisibilityToggle(oldPasswordInput)">
          {{oldPasswordShowButtonTitle}}
        </button>
      </div>
    </div>

    <!-- New Password Input -->
    <div class="form-control">
      <label for="password" class="label pb-0.5">
        <span class="label-text font-bold text-xs uppercase tracking-wider text-base-content/70">New Password</span>
      </label>
      <div class="relative flex items-center">
        <input 
          [type]="passwordFieldType" 
          id="password" 
          name="password" 
          #passwordInput
          [(ngModel)]="passwordValue" 
          class="input input-bordered w-full rounded-xl bg-base-200/40 border-base-300 focus:bg-base-100 focus:border-primary transition-all duration-300 pr-16"
          placeholder="••••••••" 
          minlength="4" 
          maxlength="30"
          required
        >
        <button type="button" class="btn btn-ghost btn-xs absolute right-3 rounded-lg text-[10px] uppercase font-black tracking-widest text-primary/90 hover:text-primary hover:bg-base-300/40" (click)="onVisibilityToggle(passwordInput)">
          {{passwordShowButtonTitle}}
        </button>
      </div>
    </div>

    <button 
      type="submit" 
      class="btn btn-primary w-full rounded-xl mt-6 font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 hover:scale-[1.01] active:scale-[0.99]" 
      [disabled]="!form.valid"
    >
      Update Password
    </button>
  </form>
</div>
