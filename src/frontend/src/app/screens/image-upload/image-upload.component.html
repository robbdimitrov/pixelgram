<div class="max-w-xl mx-auto my-8 sm:my-16">
  <div class="rounded-2xl border border-slate-200 bg-white p-6 text-slate-950 shadow-lg shadow-slate-900/5 dark:border-white/10 dark:bg-slate-950 dark:text-white sm:p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-black text-slate-950 dark:text-white">Upload Photo</h1>
      <p class="mt-1 text-xs text-slate-600 dark:text-slate-300">Share your captured moments with the community</p>
    </div>

    @if (imagePreview) {
      <div class="relative mb-6 flex aspect-square w-full items-center justify-center overflow-hidden rounded-2xl border border-slate-200 bg-slate-100 shadow-inner dark:border-white/10 dark:bg-slate-900 sm:aspect-[4/3]">
        <img class="w-full h-full object-cover" [src]="imagePreview" alt="Upload preview">
      </div>
    }

    <div class="group relative flex cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 p-8 transition-colors hover:border-slate-500 hover:bg-slate-100 dark:border-white/15 dark:bg-white/5 dark:hover:border-white/30 dark:hover:bg-white/10">
      <label class="flex flex-col items-center justify-center gap-4 cursor-pointer w-full py-4" for="file">
        <div class="flex h-14 w-14 items-center justify-center rounded-full bg-slate-950 text-xl text-white transition-transform duration-300 group-hover:scale-105 dark:bg-white dark:text-slate-950">
          <svg lucideSquarePlus class="w-5 h-5"></svg>
        </div>
        <div class="flex flex-col items-center text-center">
          <span class="text-base font-extrabold text-slate-950 dark:text-white">{{ imagePreview ? 'Select Different Photo' : 'Select photo file' }}</span>
          <span class="mt-1 text-xs text-slate-500 dark:text-slate-400">JPG, PNG, GIF or WEBP (Max 1MB)</span>
        </div>
        <span class="btn btn-sm mt-2 rounded-full border-0 bg-slate-950 px-5 font-bold text-white hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200">Browse File</span>
      </label>
      <input
        type="file"
        id="file"
        #file
        accept="image/*"
        class="hidden"
        (change)="onChange(file.files)"
        >
    </div>

    <button
      class="mt-6 w-full"
      appPrimaryAction
      (click)="onNextClick()"
      [disabled]="!imagePreview"
      >
      Next
    </button>
  </div>
</div>
