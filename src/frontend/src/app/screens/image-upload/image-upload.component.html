<div class="max-w-xl mx-auto my-8 sm:my-16">
  <!-- Styled Select File Area -->
  <div class="glass-card p-6 sm:p-10 rounded-3xl border border-white/25 shadow-xl">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">Upload Photo</h1>
      <p class="text-xs text-base-content/60 mt-1">Share your captured moments with the community</p>
    </div>

    <!-- Image Preview Thumbnail if selected -->
    <div *ngIf="imagePreview" class="relative w-full aspect-square sm:aspect-[4/3] rounded-2xl overflow-hidden border border-base-300 bg-base-300/10 shadow-inner flex items-center justify-center mb-6">
      <img class="w-full h-full object-cover" [src]="imagePreview" alt="Upload preview">
    </div>

    <div class="flex flex-col items-center justify-center p-8 border-2 border-dashed border-base-300 rounded-2xl bg-base-200/20 hover:bg-base-200/40 hover:border-primary/50 transition-all duration-300 group cursor-pointer relative">
      <label class="flex flex-col items-center justify-center gap-4 cursor-pointer w-full py-4" for="file">
        <div class="w-14 h-14 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xl transition-transform duration-300 group-hover:scale-110">
          <fa-icon [icon]="['far', 'plus-square']"></fa-icon>
        </div>
        <div class="flex flex-col items-center text-center">
          <span class="font-extrabold text-base text-base-content">{{ imagePreview ? 'Select Different Photo' : 'Select photo file' }}</span>
          <span class="text-xs text-base-content/40 mt-1">JPG, PNG, GIF or WEBP (Max 1MB)</span>
        </div>
        <span class="btn btn-primary btn-sm rounded-xl px-5 mt-2 font-bold shadow-md shadow-primary/20 hover:scale-105 active:scale-95">Browse File</span>
      </label>
      <input
        type="file"
        id="file"
        #file
        accept="image/*"
        class="hidden"
        (change)="onChange(file.files)"
      >
    </div>

    <!-- Next Button -->
    <button
      class="btn btn-primary w-full rounded-xl mt-6 font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 hover:scale-[1.01] active:scale-[0.99] transition-transform"
      (click)="onNextClick()"
      [disabled]="!imagePreview"
    >
      Next
    </button>
  </div>
</div>
