@if (user) {
  <div class="glass-card w-full rounded-3xl p-6 sm:p-8 shadow-md border border-white/25 flex flex-col md:flex-row gap-6 md:gap-8 items-center md:items-start">
    <!-- Avatar Column -->
    <div class="relative w-24 h-24 sm:w-28 sm:h-28 rounded-full overflow-hidden border-4 border-primary/20 shadow-lg shrink-0">
      <img class="w-full h-full object-cover" [src]="user.avatar | image" [alt]="user.username">
    </div>
    <!-- Profile Details Column -->
    <div class="flex-grow flex flex-col items-center md:items-start text-center md:text-left gap-4 w-full">
      <div class="flex flex-wrap items-center justify-center md:justify-start gap-3.5 w-full">
        <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-base-content">{{user.username}}</h1>
        @if (isCurrentUser()) {
          <div class="flex items-center gap-2">
            <a
              class="btn btn-outline btn-xs sm:btn-sm rounded-xl border-base-300 hover:bg-primary hover:border-primary hover:text-white font-bold transition-all"
              routerLink="/settings"
              >
              Edit Profile
            </a>
            <a
              class="btn btn-ghost btn-circle btn-xs sm:btn-sm text-base-content/65 hover:text-primary hover:bg-base-200"
              routerLink="/settings"
              title="Settings"
              >
              <fa-icon [icon]="['fas', 'cog']" class="text-sm"></fa-icon>
            </a>
          </div>
        }
      </div>
      <!-- Statistics Counters -->
      <div class="flex items-center gap-6 text-sm font-bold text-base-content/75 my-0.5">
        <span>
          <strong class="text-base-content font-black">{{user.images}}</strong> posts
        </span>
        <a
          [routerLink]="['/users', user.id, 'likes']"
          class="transition-colors hover:text-primary border-b border-dashed border-base-300 hover:border-primary pb-0.5"
          >
          Liked posts
        </a>
      </div>
      <!-- Bio Section -->
      <div class="flex flex-col gap-1 w-full max-w-xl">
        <h2 class="font-extrabold text-base text-base-content">{{user.name}}</h2>
        @if (user.bio) {
          <p class="text-sm text-base-content/75 whitespace-pre-wrap leading-relaxed">
            {{user.bio}}
          </p>
        }
      </div>
    </div>
  </div>
}
