@if (user) {
  <div class="flex w-full flex-col items-center gap-6 rounded-2xl border border-slate-200 bg-white p-6 text-slate-950 shadow-lg shadow-slate-900/5 dark:border-white/10 dark:bg-slate-950 dark:text-white md:flex-row md:items-start md:gap-8 sm:p-8">
    <div class="relative h-24 w-24 shrink-0 overflow-hidden rounded-full border border-slate-200 shadow-md dark:border-white/15 sm:h-28 sm:w-28">
      <img class="h-full w-full object-cover" [src]="user.avatar | image" [alt]="user.username">
    </div>
    <div class="flex w-full flex-grow flex-col items-center gap-4 text-center md:items-start md:text-left">
      <div class="flex w-full flex-wrap items-center justify-center gap-3.5 md:justify-start">
        <h1 class="text-2xl font-black tracking-tight text-slate-950 dark:text-white sm:text-3xl">{{user.username}}</h1>
        @if (isCurrentUser()) {
          <a
            class="btn btn-outline btn-xs rounded-full border-slate-300 font-bold text-slate-900 hover:border-slate-950 hover:bg-slate-950 hover:text-white dark:border-white/20 dark:text-white dark:hover:border-white dark:hover:bg-white dark:hover:text-slate-950 sm:btn-sm"
            routerLink="/settings"
            >
            Edit Profile
          </a>
        }
      </div>
      <div class="flex items-center gap-6 text-sm font-bold text-slate-600 dark:text-slate-300">
        <span>
          <strong class="font-black text-slate-950 dark:text-white">{{user.images}}</strong> posts
        </span>
        <a
          [routerLink]="['/users', user.id, 'likes']"
          class="transition-colors hover:text-slate-950 dark:hover:text-white"
          >
          <strong class="font-black text-slate-950 dark:text-white">{{user.likes}}</strong> liked posts
        </a>
      </div>
      <div class="flex w-full max-w-xl flex-col gap-1">
        <h2 class="text-base font-extrabold text-slate-950 dark:text-white">{{user.name}}</h2>
        @if (user.bio) {
          <p class="whitespace-pre-wrap text-sm leading-relaxed text-slate-600 dark:text-slate-300">
            {{user.bio}}
          </p>
        } @else {
          <p class="text-sm leading-relaxed text-slate-500 dark:text-slate-400">
            @if (isCurrentUser()) {
              Add a short bio so people know what you like to share.
            } @else {
              No bio yet.
            }
          </p>
        }
      </div>
    </div>
  </div>
}
