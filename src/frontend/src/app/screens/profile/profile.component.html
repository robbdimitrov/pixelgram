<div class="mx-auto flex max-w-4xl flex-col gap-6 pb-12">
  @if (user) {
    <app-profile-header
      [user]="user"
      >
    </app-profile-header>
  }

  <div class="h-px w-full bg-slate-200 dark:bg-white/10" aria-hidden="true"></div>

  @if (images().length > 0) {
    <div class="grid grid-cols-3 gap-2 sm:gap-4">
      @for (image of images(); track image) {
        <div class="aspect-square">
          <app-thumbnail [image]="image"></app-thumbnail>
        </div>
      }
    </div>
  } @else {
    <div class="mt-6 flex flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-white/70 p-12 text-center text-slate-500 dark:border-white/15 dark:bg-slate-950/70 dark:text-slate-400">
      <svg lucideSquarePlus class="mb-3 h-8 w-8"></svg>
      <span class="text-sm font-semibold">No uploads yet</span>
    </div>
  }

</div>
