<div class="mx-auto flex max-w-xl flex-col items-center gap-6">
  @if (isEmpty()) {
    <app-empty-state
      class="w-full"
      [icon]="emptyStateIcon()"
      [title]="emptyStateTitle()"
      [description]="emptyStateDescription()"
      [actionLabel]="emptyStateActionLabel()"
      [actionRoute]="emptyStateActionRoute()"
    ></app-empty-state>
  }

  <div class="flex w-full flex-col gap-6">
    @for (image of images(); track image) {
      <div class="w-full transition-all duration-300">
        <app-image
          [image]="image"
          [user]="image.userId | user | async"
          (like)="onLike($event)"
          (unlike)="onUnlike($event)"
          (deleteAction)="onDeleteAction($event)"
          >
        </app-image>
      </div>
    }
  </div>

  @if (hasMore() && count() > 0) {
    <button
      id="next"
      class="btn btn-outline btn-primary rounded-xl px-8 font-bold transition-transform hover:scale-105 active:scale-95"
      (click)="onNextClick()"
      [disabled]="isLoadingNextPage"
      >
      @if (isLoadingNextPage) {
        <span class="loading loading-spinner"></span>
      } @else {
        Load More
      }
    </button>
  }
</div>
