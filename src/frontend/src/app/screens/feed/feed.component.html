<div class="mx-auto flex max-w-xl flex-col items-center gap-6 pb-12">
  @if (isEmpty()) {
    <div class="mt-10 flex w-full flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-white p-8 text-center text-slate-950 shadow-lg shadow-slate-900/5 dark:border-white/15 dark:bg-slate-950 dark:text-white sm:p-10">
      <div class="grid h-14 w-14 place-items-center rounded-full bg-slate-950 text-white dark:bg-white dark:text-slate-950">
        <svg lucideSquarePlus class="h-6 w-6"></svg>
      </div>
      <h1 class="mt-5 text-2xl font-black">No posts yet</h1>
      <p class="mt-2 max-w-sm text-sm leading-6 text-slate-600 dark:text-slate-300">
        Your feed is empty. Upload the first photo to start filling PixelGram.
      </p>
      <a
        routerLink="/upload"
        class="btn mt-6 h-12 min-h-12 rounded-full border-0 bg-slate-950 px-6 font-bold text-white shadow-lg shadow-slate-900/15 hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200"
      >
        Upload Photo
      </a>
    </div>
  }

  <div class="flex w-full flex-col gap-6">
    @for (image of images(); track image) {
      <div class="w-full transition-all duration-300">
        <app-image
          [image]="image"
          [user]="image.userId | user | async"
          (like)="onLike($event)"
          (unlike)="onUnlike($event)"
          (deleteAction)="onDeleteAction($event)"
          >
        </app-image>
      </div>
    }
  </div>

  @if (count() > 5) {
    <button
      id="next"
      class="btn btn-outline btn-primary rounded-xl px-8 mt-4 hover:scale-105 active:scale-95 transition-transform font-bold"
      (click)="onNextClick()"
      >
      Load More
    </button>
  }
</div>
