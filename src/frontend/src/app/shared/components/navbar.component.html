<header class="sticky top-3 z-50 mx-auto flex min-h-16 max-w-5xl items-center justify-between gap-2 rounded-full border border-slate-200 bg-white/90 px-3 py-2 text-slate-950 shadow-lg shadow-slate-900/5 backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/90 dark:text-white sm:top-5 sm:min-h-[4.25rem] sm:px-5">
  <a class="flex min-w-0 items-center gap-2 no-underline transition-transform duration-200 hover:scale-[1.01] active:scale-[0.99] sm:gap-3" routerLink="/" aria-label="PixelGram home">
    <span class="grid h-10 w-10 shrink-0 place-items-center rounded-full bg-slate-950 text-white shadow-md shadow-slate-900/15 dark:bg-white dark:text-slate-950 sm:h-12 sm:w-12">
      <svg lucideCamera class="h-5 w-5 sm:h-6 sm:w-6"></svg>
    </span>
    <span class="hidden truncate text-2xl font-extrabold tracking-normal sm:inline sm:text-[1.7rem]">PixelGram</span>
  </a>

  <nav class="flex shrink-0 items-center gap-1 rounded-full bg-slate-950/5 p-1 leading-none dark:bg-white/10 sm:gap-2 sm:p-1.5" aria-label="Primary navigation">
    @if (userId()) {
      <a
        class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-slate-700 transition-colors hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white sm:h-11 sm:w-11"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        routerLink="/feed"
        title="Home"
        aria-label="Home"
      >
        <svg lucideHome class="h-5 w-5 block"></svg>
      </a>

      <a
        class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-slate-700 transition-colors hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white sm:h-11 sm:w-11"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        routerLink="/upload"
        title="Upload"
        aria-label="Upload"
      >
        <svg lucideSquarePlus class="h-5 w-5 block"></svg>
      </a>

      <a
        class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-slate-700 transition-colors hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white sm:h-11 sm:w-11"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        [routerLink]="['/users', userId()]"
        title="Profile"
        aria-label="Profile"
      >
        <svg lucideUser class="h-5 w-5 block"></svg>
      </a>
    } @else {
      <a class="btn flex h-11 min-h-11 items-center justify-center rounded-full border-0 bg-slate-950 px-4 pb-0.5 text-sm font-extrabold leading-none text-white shadow-md shadow-slate-900/15 hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200 sm:px-6 sm:text-base" [routerLink]="authNavRoute()">
        <span class="leading-none">{{ authNavTitle() }}</span>
      </a>
    }

    <span class="mx-0.5 h-8 w-px bg-slate-950/10 dark:bg-white/15 sm:mx-1" aria-hidden="true"></span>

    <div class="relative">
      <button
        type="button"
        class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-slate-700 transition-colors hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white sm:h-11 sm:w-11"
        (click)="isThemeMenuOpen = !isThemeMenuOpen"
        [title]="themeTitle()"
        [attr.aria-label]="themeTitle()"
        [attr.aria-expanded]="isThemeMenuOpen"
      >
        @if (themePreference === 'system') {
          <svg lucideMonitor class="block h-5 w-5"></svg>
        } @else if (isDarkMode) {
          <svg lucideMoon class="block h-5 w-5"></svg>
        } @else {
          <svg lucideSun class="block h-5 w-5"></svg>
        }
      </button>

      @if (isThemeMenuOpen) {
        <div class="absolute right-0 top-12 z-50 grid w-32 gap-1 rounded-2xl border border-slate-200 bg-white p-1.5 text-sm font-bold text-slate-900 shadow-xl shadow-slate-900/10 dark:border-white/10 dark:bg-slate-900 dark:text-white">
          @for (theme of themeOptions; track theme) {
            <button
              type="button"
              class="rounded-xl px-3 py-2 text-left transition-colors hover:bg-slate-100 dark:hover:bg-white/10"
              [ngClass]="{'bg-slate-950 text-white dark:bg-white dark:text-slate-950': themeOptionActive(theme)}"
              (click)="setThemePreference(theme)"
            >
              {{ themeOptionTitle(theme) }}
            </button>
          }
        </div>
      }
    </div>
  </nav>
</header>
