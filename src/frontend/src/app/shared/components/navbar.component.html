<header class="sticky top-3 z-50 mx-auto flex min-h-[4.25rem] max-w-5xl items-center justify-between gap-3 rounded-full border border-white/70 bg-white/85 px-4 py-2.5 text-slate-950 shadow-xl shadow-slate-900/10 backdrop-blur-2xl dark:border-white/10 dark:bg-slate-950/80 dark:text-white dark:shadow-black/30 sm:top-5 sm:min-h-[4.5rem] sm:px-5">
  <a class="flex min-w-0 items-center gap-3 no-underline transition-transform duration-200 hover:scale-[1.01] active:scale-[0.99]" routerLink="/" aria-label="PixelGram home">
    <span class="grid h-12 w-12 shrink-0 place-items-center rounded-full bg-slate-950 text-white shadow-lg shadow-slate-900/20 dark:bg-white dark:text-slate-950 sm:h-[3.25rem] sm:w-[3.25rem]">
      <svg lucideCamera class="h-5 w-5 sm:h-6 sm:w-6"></svg>
    </span>
    <span class="truncate text-2xl font-extrabold tracking-normal sm:text-[1.7rem]">PixelGram</span>
  </a>

  <nav class="flex shrink-0 items-center gap-2 rounded-full bg-slate-950/5 p-1.5 leading-none dark:bg-white/10" aria-label="Primary navigation">
    @if (userId()) {
      <a
        class="btn btn-ghost btn-circle grid h-11 min-h-11 w-11 place-items-center p-0 text-slate-700 hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        routerLink="/feed"
        title="Home"
        aria-label="Home"
      >
        <svg lucideHome class="h-5 w-5 block"></svg>
      </a>

      <a
        class="btn btn-ghost btn-circle grid h-11 min-h-11 w-11 place-items-center p-0 text-slate-700 hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        routerLink="/upload"
        title="Upload"
        aria-label="Upload"
      >
        <svg lucideSquarePlus class="h-5 w-5 block"></svg>
      </a>

      <a
        class="btn btn-ghost btn-circle grid h-11 min-h-11 w-11 place-items-center p-0 text-slate-700 hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        [routerLink]="['/users', userId()]"
        title="Profile"
        aria-label="Profile"
      >
        <svg lucideUser class="h-5 w-5 block"></svg>
      </a>
    } @else {
      <a class="btn flex h-11 min-h-11 items-center justify-center rounded-full border-0 bg-slate-950 px-5 pb-0.5 text-base font-extrabold leading-none text-white shadow-lg shadow-slate-900/20 hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200 sm:px-6" [routerLink]="authNavRoute()">
        <span class="leading-none">{{ authNavTitle() }}</span>
      </a>
    }

    <span class="mx-1 h-8 w-px bg-slate-950/10 dark:bg-white/15" aria-hidden="true"></span>

    <button
      type="button"
      class="btn btn-ghost btn-circle grid h-11 min-h-11 w-11 place-items-center p-0 text-slate-700 hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white"
      (click)="toggleTheme()"
      [title]="isDarkMode ? 'Switch to light theme' : 'Switch to dark theme'"
      [attr.aria-label]="isDarkMode ? 'Switch to light theme' : 'Switch to dark theme'"
    >
      @if (isDarkMode) {
        <svg lucideSun class="h-5 w-5 block"></svg>
      } @else {
        <svg lucideMoon class="h-5 w-5 block"></svg>
      }
    </button>
  </nav>
</header>
