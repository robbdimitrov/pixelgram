<div class="flex flex-col gap-4">
  <form class="flex items-center gap-3 border-b border-slate-100 pb-4 dark:border-white/10" (ngSubmit)="onSubmit()">
    <input
      #commentInput
      type="text"
      class="min-w-0 flex-1 bg-transparent text-sm text-slate-950 placeholder:text-slate-400 focus:outline-none dark:text-white dark:placeholder:text-slate-500"
      placeholder="Add a comment…"
      maxlength="400"
      autocomplete="off"
      [(ngModel)]="newCommentBody"
      name="commentBody"
    >
    <button
      type="submit"
      class="shrink-0 text-primary transition-opacity disabled:opacity-40"
      [disabled]="!newCommentBody.trim() || isSubmitting()"
      aria-label="Post comment"
    >
      @if (isSubmitting()) {
        <span class="loading loading-spinner loading-xs"></span>
      } @else {
        <svg lucideSend class="h-5 w-5"></svg>
      }
    </button>
  </form>

  @for (comment of comments(); track comment.id) {
    <div class="group flex items-start gap-3">
      <a [routerLink]="'/@' + comment.username" appAvatarStyle="sm">
        <img class="h-full w-full object-cover" [src]="comment.avatar | image" [alt]="comment.username" loading="lazy" decoding="async">
      </a>
      <div class="min-w-0 flex-1 text-sm leading-6">
        <a [routerLink]="'/@' + comment.username" class="mr-1.5 font-bold text-slate-950 hover:underline dark:text-white">{{comment.username}}</a>
        <span class="break-words whitespace-pre-wrap text-slate-700 dark:text-slate-300">{{comment.body}}</span>
        <div class="mt-0.5 text-xs text-slate-400 dark:text-slate-500">{{comment.created | relativedate}}</div>
      </div>
      @if (isOwnComment(comment)) {
        <button
          type="button"
          class="-mr-2 mt-0.5 inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-slate-400 transition-all duration-150 hover:bg-rose-500/10 hover:text-rose-600 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-rose-500/50 dark:text-slate-500 dark:hover:text-rose-400"
          aria-label="Delete comment"
          title="Delete comment"
          (click)="onDelete(comment)"
        >
          <svg lucideTrash2 class="h-4 w-4"></svg>
        </button>
      }
    </div>
  }

  @if (hasMore() && comments().length > 0) {
    <button
      type="button"
      class="self-start text-sm font-semibold text-slate-500 hover:text-slate-950 dark:text-slate-400 dark:hover:text-white"
      [disabled]="isLoadingMore()"
      (click)="onLoadMore()"
    >
      @if (isLoadingMore()) {
        <span class="loading loading-spinner loading-xs"></span>
      } @else {
        Load more comments
      }
    </button>
  }
</div>
