<header class="relative z-10 mx-auto flex h-16 w-full items-center justify-between gap-3 rounded-full border border-slate-200 bg-white/75 px-3 py-2 text-slate-950 shadow-lg shadow-slate-900/10 backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/75 dark:text-white sm:px-5">
  <a class="flex min-w-0 items-center gap-2 no-underline transition-transform duration-200 hover:scale-[1.01] active:scale-[0.99] sm:gap-3" routerLink="/" aria-label="PixelGram home">
    <span class="grid h-10 w-10 shrink-0 place-items-center rounded-full bg-slate-950 text-white shadow-md shadow-slate-900/15 dark:bg-white dark:text-slate-950">
      <svg lucideCamera class="h-5 w-5"></svg>
    </span>
    <span class="hidden truncate text-2xl font-extrabold tracking-normal sm:inline sm:text-[1.5rem]">PixelGram</span>
  </a>

  <nav class="flex shrink-0 items-center gap-1 rounded-full bg-slate-950/5 p-1 leading-none dark:bg-white/5 sm:gap-2" aria-label="Primary navigation">
    @if (currentUser(); as user) {
      <a
        class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-slate-700 transition-colors hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        routerLink="/feed"
        title="Home"
        aria-label="Home"
      >
        <svg lucideHome class="h-5 w-5 block"></svg>
      </a>

      <a
        class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-slate-700 transition-colors hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        routerLink="/upload"
        title="Upload"
        aria-label="Upload"
      >
        <svg lucideSquarePlus class="h-5 w-5 block"></svg>
      </a>

      <a
        class="grid h-10 w-10 shrink-0 place-items-center rounded-full text-slate-700 transition-colors hover:bg-white hover:text-slate-950 dark:text-slate-200 dark:hover:bg-white/15 dark:hover:text-white"
        routerLinkActive="bg-white text-slate-950 shadow-md dark:bg-white dark:text-slate-950"
        [routerLink]="'/@' + user.username"
        title="Profile"
        aria-label="Profile"
      >
        <svg lucideUser class="h-5 w-5 block"></svg>
      </a>
    } @else {
      <a class="btn flex h-11 min-h-11 items-center justify-center rounded-full border-0 bg-slate-950 px-4 pb-0.5 text-sm font-extrabold leading-none text-white shadow-md shadow-slate-900/15 hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200 sm:px-6 sm:text-base"
        routerLink="/login"
      >
        <span class="leading-none">Log In</span>
      </a>
    }
  </nav>
</header>
