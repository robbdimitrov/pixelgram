<div class="flex w-full flex-col items-center justify-center gap-4 rounded-2xl border border-dashed border-slate-300 bg-white p-6 text-center text-slate-950 shadow-lg shadow-slate-900/5 dark:border-white/15 dark:bg-slate-950 dark:text-white sm:px-8">
  <div class="grid h-14 w-14 place-items-center rounded-full bg-slate-950 text-white dark:bg-white dark:text-slate-950">
    @if (icon() === 'camera') {
      <svg lucideCamera class="h-6 w-6"></svg>
    } @else if (icon() === 'heart') {
      <svg lucideHeart class="h-6 w-6"></svg>
    } @else if (icon() === 'triangle-alert') {
      <svg lucideTriangleAlert class="h-6 w-6"></svg>
    } @else {
      <svg lucideSquarePlus class="h-6 w-6"></svg>
    }
  </div>
  <h2 class="text-2xl font-black">{{ title() }}</h2>
  <p class="max-w-sm text-sm leading-6 text-slate-600 dark:text-slate-300">
    {{ description() }}
  </p>
  @if (actionLabel() && actionRoute()) {
    <a
      [routerLink]="actionRoute()"
      class="btn inline-flex h-12 min-h-12 items-center justify-center rounded-full px-6 font-bold leading-none transition-all duration-150 active:scale-95"
      [ngClass]="{
        'border-0 bg-slate-950 text-white shadow-lg shadow-slate-900/15 hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200': actionStyle() === 'primary',
        'border border-slate-300 bg-transparent text-slate-900 hover:border-slate-400 hover:bg-slate-50 dark:border-white/15 dark:bg-transparent dark:text-white dark:hover:border-white/30 dark:hover:bg-white/5': actionStyle() === 'outline'
      }"
    >
      {{ actionLabel() }}
    </a>
  }
</div>
